<main class="app-shell">
  <section class="experience-frame">
    <header class="experience-header">
      <span class="experience-kicker">Raspa y gana</span>
      <button
        *ngIf="currentStep !== 'landing' || participant || result"
        type="button"
        class="reset-button"
        (click)="restartPromotion()"
      >
        Nueva participación
      </button>
    </header>

    <app-landing-intro
      *ngIf="currentStep === 'landing'"
      (start)="startPromotion()"
    ></app-landing-intro>

    <app-participant-form
      *ngIf="currentStep === 'form'"
      [initialValue]="participant"
      (submitted)="handleParticipantSubmitted($event)"
    ></app-participant-form>

    <app-scratch-card
      *ngIf="currentStep === 'scratch'"
      [participant]="participant"
      (scratched)="revealScratchResult()"
    ></app-scratch-card>

    <app-result
      *ngIf="currentStep === 'result' && result"
      [result]="result"
      (viewSummary)="openSummary()"
      (finish)="finishPromotion()"
      (restart)="restartPromotion()"
    ></app-result>

    <app-participant-summary
      *ngIf="currentStep === 'summary' && participant && result"
      [participant]="participant"
      [result]="result"
      (restart)="restartPromotion()"
    ></app-participant-summary>
  </section>
</main>
