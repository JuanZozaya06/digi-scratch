<main class="app-shell">
  <section class="experience-frame">
    <header class="experience-header">
      <span class="experience-kicker">Raspa y gana</span>
    </header>

    <app-landing-intro
      *ngIf="currentStep === 'landing'"
      (start)="startPromotion()"
    ></app-landing-intro>

    <app-participant-form
      *ngIf="currentStep === 'form'"
      [initialValue]="participant"
      (submitted)="handleParticipantSubmitted($event)"
    ></app-participant-form>

    <app-scratch-card
      *ngIf="currentStep === 'scratch'"
      [participant]="participant"
      [result]="result"
      (scratched)="revealScratchResult()"
    ></app-scratch-card>
  </section>
</main>
