<article class="panel" [class.panel-winner]="result.isWinner">
  <div class="panel-badge">{{ result.isWinner ? 'Premio' : 'Resultado' }}</div>

  <div class="result-state" [class.result-state-winner]="result.isWinner">
    {{ result.isWinner ? 'Ganador' : 'Participación' }}
  </div>

  <h2>{{ result.isWinner ? '¡Felicidades!' : 'Gracias por participar' }}</h2>

  <p class="panel-copy" *ngIf="result.isWinner">
    Ganaste {{ result.prizeName }}.
  </p>
  <p class="panel-copy" *ngIf="!result.isWinner">
    {{ result.label }}
  </p>

  <p class="result-note" *ngIf="result.isWinner">
    Dirígete al stand para validar tus datos y retirar tu premio.
  </p>

  <button
    *ngIf="result.isWinner"
    type="button"
    class="primary-button"
    (click)="viewSummary.emit()"
  >
    Ver mis datos
  </button>

  <button
    *ngIf="!result.isWinner"
    type="button"
    class="primary-button"
    (click)="finish.emit()"
  >
    Finalizar
  </button>

  <button type="button" class="secondary-button" (click)="restart.emit()">
    Nueva participación
  </button>
</article>
