<article class="panel">
  <div class="panel-badge">Tu tarjeta</div>
  <h2>Raspa y descubre</h2>
  <p class="panel-copy">
    {{ participant?.firstName || 'Participante' }}, toca la tarjeta para descubrir tu resultado.
  </p>

  <button type="button" class="scratch-card" (click)="scratched.emit()">
    <span class="scratch-label">Raspa aquí</span>
    <span class="scratch-hint">Toca la tarjeta o presiona el botón</span>
  </button>

  <button type="button" class="primary-button" (click)="scratched.emit()">
    Raspar
  </button>
</article>
