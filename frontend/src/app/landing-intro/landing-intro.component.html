<article class="panel">
  <div class="panel-badge">Promoción activa</div>
  <h1>Descubre tu premio</h1>
  <p class="panel-copy">
    Registra tus datos, raspa la tarjeta y conoce tu resultado al instante.
  </p>

  <div class="steps-preview">
    <div class="step-card step-card-featured">
      <span class="step-icon">ID</span>
      <strong>Regístrate</strong>
      <small>Confirma tus datos</small>
    </div>

    <img class="step-arrow" src="arrow-right.png" alt="" aria-hidden="true">

    <div class="step-card">
      <span class="step-icon">★</span>
      <strong>Raspa</strong>
      <small>Descubre tu suerte</small>
    </div>

    <img class="step-arrow" src="arrow-right.png" alt="" aria-hidden="true">

    <div class="step-card">
      <span class="step-icon">OK</span>
      <strong>Canjea</strong>
      <small>Ve al stand</small>
    </div>
  </div>

  <button type="button" class="primary-button" (click)="start.emit()">
    Comenzar
  </button>

  <p class="legal-copy">Promoción sujeta a disponibilidad de premios.</p>
</article>
