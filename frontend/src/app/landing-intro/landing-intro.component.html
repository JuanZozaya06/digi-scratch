<article class="panel">
  <div class="panel-badge">Paso 1</div>
  <h1>Participa y descubre tu premio</h1>
  <p class="panel-copy">
    Completa tus datos, raspa la tarjeta y conoce tu resultado.
  </p>

  <div class="panel-preview">
    <div class="preview-card">
      <span>Landing</span>
    </div>
    <div class="preview-card">
      <span>Formulario</span>
    </div>
    <div class="preview-card">
      <span>Resultado</span>
    </div>
  </div>

  <button type="button" class="primary-button" (click)="start.emit()">
    Comenzar
  </button>

  <p class="legal-copy">Demo visual. Los resultados mostrados son simulados.</p>
</article>
