<article class="panel">
  <div class="panel-badge">Tus datos</div>
  <h2>Registra tu participación</h2>
  <p class="panel-copy">
    Completa la información para asociar el resultado a tu participación.
  </p>

  <form [formGroup]="participantForm" (ngSubmit)="onSubmit()" novalidate class="form-grid">
    <label class="field">
      <span>Nombre</span>
      <input type="text" formControlName="firstName" placeholder="Ej. Ana" />
      <small *ngIf="hasError('firstName')">El nombre es obligatorio.</small>
    </label>

    <label class="field">
      <span>Apellido</span>
      <input type="text" formControlName="lastName" placeholder="Ej. Pérez" />
      <small *ngIf="hasError('lastName')">El apellido es obligatorio.</small>
    </label>

    <div class="field document-field">
      <span>Cédula</span>
      <div class="document-row">
        <select formControlName="documentPrefix" aria-label="Prefijo de cédula">
          <option *ngFor="let prefix of documentPrefixes" [value]="prefix">
            {{ prefix }}
          </option>
        </select>
        <input
          type="text"
          inputmode="numeric"
          maxlength="9"
          formControlName="documentNumber"
          placeholder="12345678"
          (input)="normalizeDocumentNumber()"
        />
      </div>
      <small *ngIf="hasError('documentNumber', 'required')">La cédula es obligatoria.</small>
      <small *ngIf="hasError('documentNumber', 'pattern')">Ingresa solo números, entre 6 y 9 dígitos.</small>
    </div>

    <label class="field">
      <span>Teléfono</span>
      <input
        type="tel"
        inputmode="numeric"
        maxlength="12"
        formControlName="phone"
        placeholder="0412-1234567"
        (input)="formatPhone()"
      />
      <small *ngIf="hasError('phone', 'required')">El teléfono es obligatorio.</small>
      <small *ngIf="hasError('phone', 'phonePrefix')">
        Usa 0414, 0424, 0416, 0426, 0412, 0422 o un prefijo 02XX.
      </small>
    </label>

    <label class="field field-full">
      <span>Correo</span>
      <input type="email" formControlName="email" placeholder="Ej. correo@ejemplo.com" />
      <small *ngIf="hasError('email', 'required')">El correo es obligatorio.</small>
      <small *ngIf="hasError('email', 'email')">Ingresa un correo válido.</small>
    </label>

    <button type="submit" class="primary-button" [disabled]="participantForm.invalid">
      Participar
    </button>
  </form>
</article>
